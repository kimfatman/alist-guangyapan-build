name: Build AList with GuangYaPan
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
      - name: Init AList source (with GuangYaPan)
        run: cd alist-lib/scripts && chmod +x *.sh && ./init_alist.sh
      - name: Init gomobile
        run: cd alist-lib/scripts && ./init_gomobile.sh
      - name: Build AAR
        run: cd alist-lib/scripts && ./gobind.sh
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: alist-android-aar
          path: output/*.aar
      - name: Extract libgojni.so
        run: |
          mkdir -p so-output
          for aar in output/*.aar; do
            [ -f "$aar" ] && unzip -o "$aar" "jni/*" -d so-output/
          done
      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libgojni-arm64
          path: so-output/jni/arm64-v8a/*.so